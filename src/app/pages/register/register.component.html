<div class="register-wrapper">
  <!-- Cercles décoratifs animés en arrière-plan -->
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <div class="login-card">
    <div class="login-brand" routerLink="/">
      <div class="logo-icon">FB</div>
      <div class="brand-text">
        <h2>Fadjia <span>Bank</span></h2>
      </div>
    </div>

    <h1 class="login-title">Créer un <span>compte</span></h1>
    <p class="login-subtitle">
      L'avenir de vos finances commence ici.
    </p>

    <form (ngSubmit)="register()" #regForm="ngForm">
      
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <div class="input-wrapper">
          <span class="input-icon">👤</span>
          <input class="form-input"
                 type="text"
                 placeholder="M. Jean Dupont"
                 [(ngModel)]="fullName"
                 name="fullName" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input class="form-input"
                 type="email"
                 placeholder="jean.dupont@email.com"
                 [(ngModel)]="email"
                 name="email" required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input class="form-input"
                 type="password"
                 placeholder="••••••••"
                 [(ngModel)]="password"
                 name="password" required />
        </div>
      </div>

      <button class="login-btn" type="submit" [disabled]="!regForm.form.valid">
        Ouvrir mon compte ⚡
      </button>
    </form>

    <div *ngIf="message"
       class="message-box"
       [ngClass]="{'success': message.includes('OK'), 'error': !message.includes('OK')}">
      {{ message }}
    </div>

    <p class="bottom-text">
      Déjà membre ? <a routerLink="/login">Connectez-vous</a>
    </p>
  </div>
</div>
