<h2>Test Login</h2>

<form (ngSubmit)="login()">
  <input type="email"
         placeholder="Email"
         [(ngModel)]="email"
         name="email" />

  <br /><br />

  <input type="password"
         placeholder="Mot de passe"
         [(ngModel)]="password"
         name="password" />

  <br /><br />

  <button type="submit">Tester connexion</button>
</form>

<p>{{ message }}</p>
